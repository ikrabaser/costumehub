{% extends "base.html" %}

{% block title %}
    Kayıt Ol | CostumeHub
{% endblock %}

{% block content %}

<section class="py-5">
    <div class="container">

        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">

                <div class="card border-0 shadow-sm">
                    <div class="card-body p-4">

                        <h1 class="h3 fw-bold mb-4">
                            Hesap Oluştur
                        </h1>

                        <form method="POST">
                            {% csrf_token %}

                            {{ form.as_p }}

                            <button
                                type="submit"
                                class="btn btn-dark w-100"
                            >
                                Kayıt Ol
                            </button>
                        </form>

                        <p class="text-center mt-3 mb-0">
                            Zaten hesabın var mı?

                            <a href="{% url 'accounts:giris' %}">
                                Giriş yap
                            </a>
                        </p>

                    </div>
                </div>

            </div>
        </div>

    </div>
</section>

{% endblock %}
